<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SIGR - Demo Restaurante</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Navegacion principal">
        <div class="brand">
          <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Panzerotti-01.jpg" alt="Pancerotti">
          <strong>Restaurante</strong>
        </div>

        <nav class="menu">
          <button type="button" class="active" data-view="dashboard">Dashboard</button>
          <button type="button" data-view="offers">Ofertas del dia <span>Nuevo</span></button>
          <button type="button" data-view="products">Productos</button>
          <button type="button" data-view="customers">Clientes</button>
          <button type="button" data-view="orders">Pedidos</button>
        </nav>

        <div class="sidebar-foot">
          <span id="apiStatus" class="status">Conectando</span>
        </div>
      </aside>

      <main class="content">
        <header class="topbar">
          <div>
            <p class="eyebrow">&nbsp;</p>
            <h1 id="viewTitle">Dashboard</h1>
          </div>
        </header>

        <section id="viewRoot" class="view-root" aria-live="polite"></section>
      </main>
    </div>

    <div id="drawerBackdrop" class="drawer-backdrop" hidden></div>
    <aside id="orderDrawer" class="drawer" aria-label="Detalle del pedido" hidden></aside>
    <div id="modalBackdrop" class="modal-backdrop" hidden></div>
    <section id="entityModal" class="modal" aria-label="Formulario de gestion" hidden></section>

    <script src="/app.js"></script>
  </body>
</html>
