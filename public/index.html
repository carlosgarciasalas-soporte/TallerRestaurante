<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SIGR - Demo Restaurante</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Navegacion principal">
        <div class="brand">
          <img src="/assets/logo.png" alt="Logo Restaurante">
          <strong>Restaurante</strong>
        </div>

        <nav class="menu">
          <button type="button" class="active" data-view="dashboard">Dashboard</button>
          <button type="button" data-view="offers">Ofertas del dia <span>Nuevo</span></button>
          <button type="button" data-view="products">Productos</button>
          <button type="button" data-view="categories">Categorias</button>
          <button type="button" data-view="reservations">Reservas</button>
          <button type="button" data-view="cash">Caja y reportes</button>
          <button type="button" data-view="customers">Clientes</button>
          <button type="button" data-view="orders">Pedidos</button>
        </nav>

      </aside>

      <main class="content">
        <header class="topbar">
          <div class="header-title">
            <h1>¡Bienvenido de vuelta!</h1>
            <p>Resumen general de tu restaurante <span id="viewTitle">Dashboard</span></p>
          </div>
          <label class="search-box" aria-label="Buscar">
            <span>⌕</span>
            <input type="search" placeholder="Buscar...">
          </label>
          <div class="header-actions">
            <button type="button" aria-label="Notificaciones">!</button>
            <button type="button" aria-label="Ayuda">?</button>
            <div class="profile-chip">
              <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=120&q=80" alt="Administrador">
              <span></span>
            </div>
          </div>
        </header>

        <section id="viewRoot" class="view-root" aria-live="polite"></section>
      </main>
    </div>

    <div id="drawerBackdrop" class="drawer-backdrop" hidden></div>
    <aside id="orderDrawer" class="drawer" aria-label="Detalle del pedido" hidden></aside>
    <div id="modalBackdrop" class="modal-backdrop" hidden></div>
    <section id="entityModal" class="modal" aria-label="Formulario de gestion" hidden></section>

    <script src="/app.js"></script>
  </body>
</html>
